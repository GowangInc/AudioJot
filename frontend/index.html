<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AudioJot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>AudioJot</h1>
        <button id="btn-new-session">+ New Session</button>
      </div>
      <div id="session-list" tabindex="0"></div>
      <div id="audio-panel">
        <h3>Audio</h3>
        <div id="timer">00:00:00</div>
        <div id="audio-controls">
          <button id="btn-record">Record</button>
          <button id="btn-stop" disabled>Stop</button>
          <button id="btn-play" disabled>Play</button>
        </div>
        <audio id="audio-player" controls hidden></audio>
        <input type="file" id="audio-upload" accept="audio/*" hidden />
        <button id="btn-upload">Upload Audio</button>
        <button id="btn-transcribe" disabled>Transcribe</button>
        <button id="btn-import" disabled>Import Transcript</button>
        <div id="status-msg"></div>
      </div>
    </aside>

    <main id="main">
      <div id="main-header">
        <input id="session-title" type="text" placeholder="Session title..." disabled />
        <div class="actions">
          <button id="btn-view-notes" class="active">Notes</button>
          <button id="btn-view-doc" hidden>Document</button>
          <button id="btn-export-md" disabled>Export</button>
        </div>
      </div>
      <div id="editor-container">
        <textarea id="editor" placeholder="Select or create a session to start taking notes..." disabled></textarea>
        <div id="document-view" hidden></div>
      </div>
    </main>
  </div>

  <div id="context-menu" hidden>
    <div class="ctx-item" data-action="rename">Rename</div>
    <div class="ctx-item" data-action="delete">Delete</div>
    <div class="ctx-item" data-action="export">Export Markdown</div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
